<!DOCTYPE html>
<html>
<head>
<title>Snake Game</title>
</head>
<body style="text-align:center;background:black;color:white;">
<h1>Snake Game</h1>
<canvas id="game" width="400" height="400" style="background:#111;"></canvas>

<script>
let canvas = document.getElementById("game");
let ctx = canvas.getContext("2d");

let snake = [{x:10,y:10}];
let food = {x:5,y:5};
let dx=1, dy=0;

document.addEventListener("keydown", e=>{
    if(e.key=="ArrowUp"){dx=0;dy=-1;}
    if(e.key=="ArrowDown"){dx=0;dy=1;}
    if(e.key=="ArrowLeft"){dx=-1;dy=0;}
    if(e.key=="ArrowRight"){dx=1;dy=0;}
});

function draw(){
    ctx.fillStyle="black";
    ctx.fillRect(0,0,400,400);

    ctx.fillStyle="red";
    ctx.fillRect(food.x*20,food.y*20,20,20);

    ctx.fillStyle="lime";
    snake.forEach(s=>ctx.fillRect(s.x*20,s.y*20,20,20));

    let head = {x:snake[0].x+dx,y:snake[0].y+dy};
    snake.unshift(head);

    if(head.x==food.x && head.y==food.y){
        food = {x:Math.floor(Math.random()*20),y:Math.floor(Math.random()*20)};
    } else {
        snake.pop();
    }
}

setInterval(draw,150);
</script>
</body>
</html>
