<!DOCTYPE html>
<html>
<head>
<title>Tic Tac Toe</title>
<style>
body { text-align:center; font-family:Arial; background:#111; color:white;}
.grid { display:grid; grid-template-columns: repeat(3,100px); gap:5px; justify-content:center;}
.cell { width:100px; height:100px; background:#333; font-size:40px; display:flex; align-items:center; justify-content:center; cursor:pointer;}
</style>
</head>
<body>
<h1>Tic Tac Toe</h1>
<div class="grid" id="grid"></div>
<script>
let current = "X";
const grid = document.getElementById("grid");

for(let i=0;i<9;i++){
    let cell = document.createElement("div");
    cell.className="cell";
    cell.onclick = function(){
        if(cell.innerHTML==""){
            cell.innerHTML=current;
            current = current=="X"?"O":"X";
        }
    }
    grid.appendChild(cell);
}
</script>
</body>
</html>
